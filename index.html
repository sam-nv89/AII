<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Интегратор 2026 — Путь к первому доходу за 90 дней</title>

    <!-- SEO Meta -->
    <meta name="description" content="Интерактивная образовательная программа по обучению AI-автоматизациям на базе Make.com и OpenAI. От нуля до профи за 90 дней.">
    <meta name="keywords" content="AI, автоматизация, Make.com, OpenAI, обучение, фриланс, доход, 2026">
    <meta name="theme-color" content="#0d0d12">

    <!-- Open Graph -->
    <meta property="og:title" content="AI-Интегратор 2026">
    <meta property="og:description" content="Путь к первому доходу на AI-автоматизациях за 90 дней.">
    <meta property="og:type" content="website">

    <!-- Favicon (SVG emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <!-- Stylesheets (order matters) -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Inline: stack-grid & misc utilities not worth a file -->
    <style>
      /* Stack grid (home page tech stack) */
      .stack-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: var(--space-3);
      }

      .stack-item {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-3) var(--space-4);
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--color-border-light);
        border-radius: var(--radius-md);
        transition: all var(--transition-base);
      }

      .stack-item:hover {
        border-color: var(--color-border);
        background: rgba(255,255,255,0.04);
        transform: translateY(-2px);
      }

      .stack-item__icon { font-size: 24px; flex-shrink: 0; }
      .stack-item__name { font-size: var(--font-size-sm); font-weight: 600; }
      .stack-item__desc { font-size: var(--font-size-xs); color: var(--color-text-faint); margin-top: 2px; }

      /* Space-7 (1.75rem) — used in module cards */
      .module-card { --_pad: 1.75rem; padding: var(--_pad); }
    </style>
</head>
<body>

    <!-- App Root — loading screen until JS bootstraps -->
    <div id="app">
      <div class="loading-screen">
        <div class="loading-screen__logo">⚡</div>
        <div class="loading-screen__text">AI-Интегратор 2026</div>
        <div class="loading-screen__dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <!-- Application Scripts (global scope, order critical) -->
    <script src="js/store.js"></script>

    <!-- Data Modules -->
    <script src="js/modules/module1.js"></script>
    <script src="js/modules/module2.js"></script>
    <script src="js/modules/module3.js"></script>
    <script src="js/modules/module4.js"></script>
    <script src="js/modules/module5.js"></script>

    <!-- UI Components -->
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/navbar.js"></script>

    <!-- Page Views -->
    <script src="js/views/home.js"></script>
    <script src="js/views/module.js"></script>
    <script src="js/views/quiz.js"></script>

    <!-- Main App Logic -->
    <script src="js/app.js"></script>

</body>
</html>
